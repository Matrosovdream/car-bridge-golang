services:
  postgres:
    image: postgres:16-alpine
    container_name: car-bridge-postgres
    environment:
      POSTGRES_USER: carbridge
      POSTGRES_PASSWORD: carbridge
      POSTGRES_DB: carbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbridge"]
      interval: 5s
      timeout: 3s
      retries: 5
    
  redis:
    image: redis:7-alpine
    container_name: car-bridge-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cliy", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
